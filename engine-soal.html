<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Interactive Quiz Engine</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,sans-serif;
  background:#f5f7fb;
  color:#1e293b;
  min-height:100vh;
}

.app{
  width:100%;
  max-width:950px;
  margin:auto;
  padding:40px 20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin-bottom:30px;
}

.header h1{
  font-size:34px;
  margin-bottom:8px;
}

.header p{
  color:#64748b;
}

.progress-wrapper{
  width:260px;
}

.progress-bar{
  width:100%;
  height:12px;
  background:#dbeafe;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:8px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#2563eb;
  transition:0.3s ease;
}

.card{
  background:white;
  border-radius:24px;
  padding:32px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.question-meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.topic{
  background:#eff6ff;
  color:#1d4ed8;
  padding:8px 14px;
  border-radius:999px;
  font-size:14px;
  font-weight:600;
}

.question{
  font-size:24px;
  line-height:1.6;
  margin-bottom:28px;
}

.options{
  display:grid;
  gap:14px;
}

.option{
  width:100%;
  border:2px solid #e2e8f0;
  border-radius:16px;
  background:white;
  padding:18px;
  cursor:pointer;
  transition:0.2s ease;
  text-align:left;
  font-size:16px;
  color:#000;
}

.option:hover{
  border-color:#2563eb;
}

.option.selected{
  border-color:#2563eb;
  background:#eff6ff;
}

.option.correct{
  border-color:#16a34a;
  background:#dcfce7;
}

.option.wrong{
  border-color:#dc2626;
  background:#fee2e2;
}

.reasoning{
  margin-top:28px;
}

.reasoning textarea{
  width:100%;
  min-height:140px;
  resize:vertical;
  border:2px solid #cbd5e1;
  border-radius:16px;
  padding:18px;
  margin-top:12px;
  font-size:15px;
}

.feedback{
  margin-top:30px;
  background:#f8fafc;
  border-radius:18px;
  padding:24px;
}

.badge{
  display:inline-block;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  margin-bottom:16px;
}

.badge.correct{
  background:#dcfce7;
  color:#166534;
}

.badge.wrong{
  background:#fee2e2;
  color:#991b1b;
}

.reasoning-score{
  margin-top:16px;
  padding:16px;
  background:#eef2ff;
  border-radius:14px;
}

.actions{
  display:flex;
  justify-content:flex-end;
  margin-top:28px;
}

button{
  border:none;
  background:#2563eb;
  color:white;
  padding:14px 24px;
  border-radius:14px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
}

button:hover{
  opacity:0.92;
}

.hidden{
  display:none !important;
}

.result{
  margin-top:20px;
}

.score{
  text-align:center;
  margin:24px 0;
}

.score span{
  font-size:72px;
  font-weight:800;
}

.grade{
  width:fit-content;
  margin:auto;
  padding:10px 20px;
  border-radius:999px;
  background:#dbeafe;
  color:#1d4ed8;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
  margin:40px 0;
}

.grid-item{
  background:#f8fafc;
  border-radius:18px;
  padding:20px;
}

.grid-item h4{
  margin-bottom:10px;
  color:#475569;
}

.grid-item p{
  font-size:28px;
  font-weight:700;
}

.section{
  margin-top:40px;
}

.section h3{
  margin-bottom:18px;
}

.topic-item,
.recommend-item{
  background:#f8fafc;
  border-radius:14px;
  padding:14px 18px;
  margin-bottom:12px;
}

#weaknessList{
  padding-left:20px;
}

#weaknessList li{
  margin-bottom:10px;
}

@media(max-width:768px){

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .question{
    font-size:20px;
  }

  .card{
    padding:24px;
  }

}

</style>
</head>
<body>

<div class="app">

  <div class="header">

    <div>
      <h1 id="quizTitle">Interactive Quiz</h1>
      <p>Dynamic JSON Driven Quiz Engine</p>
    </div>

    <div class="progress-wrapper">

      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:10px;
        font-weight:700;
        color:#1e293b;
      ">
        <span>Quiz Progress</span>
        <span id="progressText">0 / 0 soal</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </div>

  </div>


  <!-- QUIZ -->

  <div id="quizScreen">

    <div class="card">

      <div class="question-meta">
        <div id="questionNumber">Question 1</div>
        <div class="topic" id="questionTopic">Topic</div>
      </div>

      <div class="question" id="questionText"></div>

      <div class="options" id="optionsContainer"></div>

      <div class="reasoning hidden" id="reasoningSection">

        <label>
          Jelaskan alasan jawaban Anda
        </label>

        <textarea
          id="reasoningInput"
          placeholder="Tuliskan alasan Anda..."
        ></textarea>

      </div>

      <div class="feedback hidden" id="feedbackContainer">

        <div class="badge" id="feedbackBadge">
          Correct
        </div>

        <p id="feedbackExplanation"></p>

        <div class="reasoning-score hidden" id="reasoningFeedback"></div>

      </div>

      <div class="actions">

        <button
          class="hidden"
          id="submitButton"
        >
          Submit
        </button>

        <button
          class="hidden"
          id="nextButton"
        >
          Next Question
        </button>

      </div>

    </div>

  </div>


  <!-- RESULT -->

  <div class="result hidden" id="resultScreen">

    <div class="card">

      <h2>Quiz Result</h2>

      <div class="score">
        <span id="finalScore">0</span>
        <small>/100</small>
      </div>

      <div class="grade" id="finalGrade">
        GOOD
      </div>


      <div class="grid">

        <div class="grid-item">
          <h4>Part A</h4>
          <p id="partAScore">0</p>
        </div>

        <div class="grid-item">
          <h4>Part B</h4>
          <p id="partBScore">0</p>
        </div>

        <div class="grid-item">
          <h4>Correct</h4>
          <p id="correctAnswers">0</p>
        </div>

        <div class="grid-item">
          <h4>Reasoning</h4>
          <p id="reasoningQuality">-</p>
        </div>

      </div>


      <div class="section">

        <h3>Performance by Topic</h3>

        <div id="topicAnalysis"></div>

      </div>


      <div class="section">

        <h3>Areas to Improve</h3>

        <ul id="weaknessList"></ul>

      </div>


      <div class="section">

        <h3>Recommendation</h3>

        <div id="recommendationList"></div>

      </div>

      <div style="margin-top:30px;">
        <button id="restartButton">
          Restart Quiz
        </button>
      </div>

    </div>

  </div>

</div>

<!-- APP JS -->
<!-- ========================================= -->

<script>

const state = {
  questions: [],
  currentQuestionIndex: 0,
  selectedOption: null,
  answers: [],
  scores: {
    partA: 0,
    partB: 0,
    correctAnswers: 0,
    reasoningTotal: 0
  }
};


const el = {

  quizTitle:
    document.getElementById('quizTitle'),

  progressFill:
    document.getElementById('progressFill'),

  progressText:
    document.getElementById('progressText'),

  questionNumber:
    document.getElementById('questionNumber'),

  questionTopic:
    document.getElementById('questionTopic'),

  questionText:
    document.getElementById('questionText'),

  optionsContainer:
    document.getElementById('optionsContainer'),

  reasoningSection:
    document.getElementById('reasoningSection'),

  reasoningInput:
    document.getElementById('reasoningInput'),

  submitButton:
    document.getElementById('submitButton'),

  nextButton:
    document.getElementById('nextButton'),

  feedbackContainer:
    document.getElementById('feedbackContainer'),

  feedbackBadge:
    document.getElementById('feedbackBadge'),

  feedbackExplanation:
    document.getElementById('feedbackExplanation'),

  reasoningFeedback:
    document.getElementById('reasoningFeedback'),

  quizScreen:
    document.getElementById('quizScreen'),

  resultScreen:
    document.getElementById('resultScreen'),

  finalScore:
    document.getElementById('finalScore'),

  finalGrade:
    document.getElementById('finalGrade'),

  partAScore:
    document.getElementById('partAScore'),

  partBScore:
    document.getElementById('partBScore'),

  correctAnswers:
    document.getElementById('correctAnswers'),

  reasoningQuality:
    document.getElementById('reasoningQuality'),

  topicAnalysis:
    document.getElementById('topicAnalysis'),

  weaknessList:
    document.getElementById('weaknessList'),

  recommendationList:
    document.getElementById('recommendationList'),

  restartButton:
    document.getElementById('restartButton')
};




function formatQuizTitle(str){

  return str
    .replace(/-/g,' ')
    .replace(/\b\w/g,c=>c.toUpperCase());

}


async function initializeQuiz(){

  try{

    const params =
      new URLSearchParams(window.location.search);

    const quizSet =
      params.get('set') || 'default';

    const response =
      await fetch(`${quizSet}.json`);

    if(!response.ok){

      throw new Error('Quiz JSON not found');

    }

    const data =
      await response.json();

    state.questions =
      data.questions || [];

    const finalTitle =
      data.quizTitle ||
      formatQuizTitle(quizSet);

    el.quizTitle.textContent =
      finalTitle;

    document.title =
      finalTitle;

    renderQuestion();

  }catch(error){

    console.error(error);

    document.body.innerHTML = `
      <div style="
        padding:40px;
        font-family:Inter,sans-serif;
      ">
        <h1>Quiz tidak ditemukan</h1>
      </div>
    `;

  }

}




function renderQuestion(){

  resetQuestionUI();

  const question =
    state.questions[state.currentQuestionIndex];

  // GUARD CLAUSE
  if(!question){

    console.error(
      'Question data not found',
      state.questions,
      state.currentQuestionIndex
    );

    document.body.innerHTML = `
      <div style="
        padding:40px;
        font-family:Inter,sans-serif;
      ">
        <h1>Question data invalid</h1>
        <p>JSON loaded but question array is empty or corrupted.</p>
      </div>
    `;

    return;
  }

  updateProgress();

  el.questionNumber.textContent =
    `Question ${state.currentQuestionIndex + 1}`;

  el.questionTopic.textContent =
    question.topic || 'General';

  el.questionText.textContent =
    question.question || '';

  if(question.requiresReasoning){

    el.reasoningSection.classList.remove('hidden');

    el.submitButton.classList.remove('hidden');
  }

  renderOptions(question.options || []);
}



function renderOptions(options){

  el.optionsContainer.innerHTML = '';

  options.forEach((option,index)=>{

    const button =
      document.createElement('button');

    button.className = 'option';

    button.innerHTML =
      `<strong>${String.fromCharCode(65+index)}.</strong> ${option}`;

    button.addEventListener('click',()=>{

      handleOptionSelect(index);
    });

    el.optionsContainer.appendChild(button);

  });

}



function handleOptionSelect(index){

  // prevent changing answer
  if(state.selectedOption !== null){
    return;
  }

  state.selectedOption = index;

  const buttons =
    document.querySelectorAll('.option');

  buttons.forEach(btn=>
    btn.classList.remove('selected')
  );

  buttons[index].classList.add('selected');

  const question =
    state.questions[state.currentQuestionIndex];

  // lock all options after selection
  disableInteraction();

  if(!question.requiresReasoning){

    processAnswer();
  }

}



function processAnswer(){

  const question =
    state.questions[state.currentQuestionIndex];

  if(state.selectedOption === null){

    alert('Please select answer');
    return;
  }

  const reasoning =
    el.reasoningInput.value.trim();

  if(
    question.requiresReasoning &&
    reasoning.length === 0
  ){

    alert('Please provide reasoning');
    return;
  }

  const isCorrect =
    state.selectedOption === question.correctAnswer;

  const reasoningResult =
    evaluateReasoning(question,reasoning);

  saveAnswer(
  question,
  isCorrect,
  reasoning,
  reasoningResult
);

updateScores(
  question,
  isCorrect
);

showFeedback(
  question,
  isCorrect,
  reasoningResult
);

}



function evaluateReasoning(question, reasoning){

  if(!question.requiresReasoning){

    return {
      status: null,
      feedback: null
    };

  }

  const cleaned =
    reasoning
      .trim()
      .toLowerCase();


  const wordCount =
    cleaned.split(/\s+/).length;

  if(wordCount < 5){

    return {
      status: 'not_suitable',
      label: 'Alasan Tidak Sesuai',
      feedback: 'Alasan terlalu singkat.'
    };

  }


  const semanticGroups =
    question.reasoningKeywords || [];

  if(!semanticGroups.length){

    return {
      status: 'needs_improvement',
      label: 'Alasan Butuh Diimprove',
      feedback: 'Belum ada semanticKeywords.'
    };

  }

  let matchedGroups = 0;

  semanticGroups.forEach(keyword=>{

  const matched =
    cleaned.includes(
      keyword.toLowerCase()
    );

  if(matched){

    matchedGroups++;

  }

});

  const ratio =
    matchedGroups / semanticGroups.length;


  if(ratio >= 0.75){

    return {
      status: 'suitable',
      label: 'Alasan Sesuai',
      feedback:
        'Penjelasan sudah mencerminkan inti jawaban yang diharapkan.'
    };

  }


  if(ratio >= 0.4){

    return {
      status: 'needs_improvement',
      label: 'Alasan Butuh Diimprove',
      feedback:
        question.idealReasoning ||
        'Penjelasan sebagian sudah sesuai, namun belum lengkap.'
    };

  }

  return {
    status: 'not_suitable',
    label: 'Alasan Tidak Sesuai',
    feedback:
      question.idealReasoning ||
      'Penjelasan belum sesuai dengan inti kasus.'
  };

}



function saveAnswer(
  question,
  isCorrect,
  reasoning,
  reasoningResult
){

  state.answers.push({

    questionId: question.id,
    topic: question.topic,
    subtopic: question.subtopic,
    difficulty: question.difficulty,
    isCorrect,
    selectedOption: state.selectedOption,
    correctAnswer: question.correctAnswer,
    reasoning,
    reasoningScore:
      reasoningResult.status === 'suitable' ? 1 :
      reasoningResult.status === 'needs_improvement' ? 0.5 : 0 

  });

}



function updateScores(
  question,
  isCorrect
){

  if(isCorrect){

    state.scores.correctAnswers += 1;
  }

  if(question.requiresReasoning){

    // PART B
    // benar = full
    // salah = 0

    if(isCorrect){

      state.scores.partB += 1;

    }

  }else{

    // PART A

    if(isCorrect){

      state.scores.partA += 1;

    }

  }

}



function showFeedback(
  question,
  isCorrect,
  reasoningResult
){

  el.feedbackContainer.classList.remove('hidden');

  el.feedbackBadge.textContent =
    isCorrect ? 'Correct' : 'Incorrect';

  el.feedbackBadge.className =
    `badge ${isCorrect ? 'correct' : 'wrong'}`;

  el.feedbackExplanation.textContent =
    question.explanation || '';

  if(question.requiresReasoning){

    el.reasoningFeedback.classList.remove('hidden');

    let html = '';

    if(isCorrect){

      html += `
        <div style="
          font-weight:700;
          margin-bottom:12px;
        ">
          ${reasoningResult.label}
        </div>
      `;

      if(
        reasoningResult.status !== 'suitable'
      ){

        html += `
          <div>
            <strong>Alasan ideal:</strong><br><br>
            ${question.idealReasoning || '-'}
          </div>
        `;
      }

    }else{

      html += `
        <div style="
          color:#991b1b;
          font-weight:700;
          margin-bottom:12px;
        ">
          Jawaban Salah — Nilai 0
        </div>

        <div>
          <strong>Alasan ideal:</strong><br><br>
          ${question.idealReasoning || '-'}
        </div>
      `;
    }

    el.reasoningFeedback.innerHTML = html;

  }

  highlightCorrectAnswer(question.correctAnswer);

  el.reasoningInput.disabled = true;

  el.nextButton.classList.remove('hidden');

  el.submitButton.classList.add('hidden');

  disableInteraction();

}



function highlightCorrectAnswer(correctIndex){

  const buttons =
    document.querySelectorAll('.option');

  buttons.forEach((btn,index)=>{

    if(index === correctIndex){

      btn.classList.add('correct');
    }

    if(
      index === state.selectedOption &&
      index !== correctIndex
    ){

      btn.classList.add('wrong');
    }

  });

}



function disableInteraction(){

  document
    .querySelectorAll('.option')
    .forEach(btn=>btn.disabled = true);

}



function nextQuestion(){

  state.currentQuestionIndex++;

  if(
    state.currentQuestionIndex >=
    state.questions.length
  ){

    showFinalResult();
    return;
  }

  renderQuestion();

}



function resetQuestionUI(){

  state.selectedOption = null;

  el.optionsContainer.innerHTML = '';

  el.feedbackContainer.classList.add('hidden');

  el.reasoningFeedback.classList.add('hidden');

  el.reasoningSection.classList.add('hidden');

  el.nextButton.classList.add('hidden');

  el.submitButton.classList.add('hidden');

  el.reasoningInput.value = '';

  el.reasoningInput.disabled = false;

}



function updateProgress(){

  const total =
    state.questions.length;

  const current =
    state.currentQuestionIndex + 1;

  const progress =
    (current / total) * 100;

  el.progressFill.style.width =
    `${progress}%`;

  el.progressText.textContent =
    `${current} / ${total} soal`;

}



function showFinalResult(){

  el.quizScreen.classList.add('hidden');

  el.resultScreen.classList.remove('hidden');

  const result =
    calculateFinalResult();

  el.finalScore.textContent =
    result.finalScore;

  el.finalGrade.textContent =
    result.grade;

  el.partAScore.textContent =
    result.partA;

  el.partBScore.textContent =
    result.partB;

  el.correctAnswers.textContent =
    `${state.scores.correctAnswers}/${state.questions.length}`;

  el.reasoningQuality.textContent =
    result.reasoningQuality;

  renderTopicAnalysis(
    result.topicPerformance
  );

  renderWeaknesses(
    result.weaknesses
  );

  renderRecommendations(
    result.recommendations
  );

}



function calculateFinalResult(){

  const partA =
    (state.scores.partA / 50) * 50;

  const partB =
    (state.scores.partB / 20) * 50;

  const finalScore =
    Math.round(partA + partB);

  return {

    partA: partA.toFixed(1),

    partB: partB.toFixed(1),

    finalScore,

    grade:
      calculateGrade(finalScore),

    reasoningQuality:
      calculateReasoningQuality(),

    topicPerformance:
      calculateTopicPerformance(),

    weaknesses:
      detectWeaknesses(),

    recommendations:
      generateRecommendations()

  };

}



function calculateGrade(score){

  if(score >= 90) return 'EXCELLENT';
  if(score >= 80) return 'GOOD';
  if(score >= 70) return 'FAIR';
  if(score >= 60) return 'WEAK';

  return 'HIGH RISK';

}



function calculateReasoningQuality(){

  const reasoningAnswers =
    state.answers.filter(
      a=>a.reasoningScore > 0
    );

  if(!reasoningAnswers.length){

    return 'LOW';
  }

  const average =
    reasoningAnswers.reduce(
      (sum,item)=>sum+item.reasoningScore,
      0
    ) / reasoningAnswers.length;

  if(average >= 0.45) return 'EXCELLENT';
  if(average >= 0.35) return 'GOOD';
  if(average >= 0.25) return 'FAIR';

  return 'WEAK';

}



function calculateTopicPerformance(){

  const topicMap = {};

  state.answers.forEach(answer=>{

    const topic =
      answer.topic || 'General';

    if(!topicMap[topic]){

      topicMap[topic] = {
        total:0,
        correct:0
      };
    }

    topicMap[topic].total++;

    if(answer.isCorrect){

      topicMap[topic].correct++;
    }

  });

  const performance = [];

  Object.keys(topicMap).forEach(topic=>{

    const data = topicMap[topic];

    performance.push({

      topic,

      score: Math.round(
        (data.correct / data.total) * 100
      )

    });

  });

  return performance;

}



function detectWeaknesses(){

  const weaknesses = [];

  const topicPerformance =
    calculateTopicPerformance();

  topicPerformance.forEach(item=>{

    if(item.score < 60){

      weaknesses.push(
        `${item.topic} below 60%`
      );

    }

  });

  const weakReasoning =
    state.answers.filter(
      a=>a.reasoningScore < 0.25
    );

  if(weakReasoning.length >= 5){

    weaknesses.push(
      'Weak analytical reasoning'
    );

  }

  return weaknesses;

}



function generateRecommendations(){

  const recommendations = [];

  const topicPerformance =
    calculateTopicPerformance();

  topicPerformance.forEach(item=>{

    if(item.score < 70){

      recommendations.push(
        `Improve understanding in ${item.topic}`
      );

    }

  });

  if(!recommendations.length){

    recommendations.push(
      'Maintain current performance'
    );

  }

  return recommendations;

}



function renderTopicAnalysis(topicPerformance){

  el.topicAnalysis.innerHTML = '';

  topicPerformance.forEach(item=>{

    const div =
      document.createElement('div');

    div.className = 'topic-item';

    div.innerHTML =
      `<strong>${item.topic}</strong> — ${item.score}%`;

    el.topicAnalysis.appendChild(div);

  });

}



function renderWeaknesses(weaknesses){

  el.weaknessList.innerHTML = '';

  if(!weaknesses.length){

    el.weaknessList.innerHTML =
      '<li>No major weaknesses detected</li>';

    return;
  }

  weaknesses.forEach(item=>{

    const li =
      document.createElement('li');

    li.textContent = item;

    el.weaknessList.appendChild(li);

  });

}



function renderRecommendations(recommendations){

  el.recommendationList.innerHTML = '';

  recommendations.forEach(item=>{

    const div =
      document.createElement('div');

    div.className = 'recommend-item';

    div.textContent = item;

    el.recommendationList.appendChild(div);

  });

}



function restartQuiz(){

  state.currentQuestionIndex = 0;

  state.selectedOption = null;

  state.answers = [];

  state.scores = {
    partA:0,
    partB:0,
    correctAnswers:0,
    reasoningTotal:0
  };

  el.resultScreen.classList.add('hidden');

  el.quizScreen.classList.remove('hidden');

  renderQuestion();

}



el.submitButton.addEventListener(
  'click',
  processAnswer
);

el.nextButton.addEventListener(
  'click',
  nextQuestion
);

el.restartButton.addEventListener(
  'click',
  restartQuiz
);



initializeQuiz();

</script>

</body>
</html>
